<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Malibu Clicker PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f, #141420);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* RO'YXATDAN O'TISH */
        #authScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            height: 100%;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-logo {
            font-size: 60px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .auth-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        .auth-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .auth-btn {
            background: linear-gradient(90deg, #ffd700, #ffa500);
            color: black;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* O'YIN EKRANI */
        #gameScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 20px 0;
        }

        /* TEPADAGI LEVEL VA PROGRESS BAR */
        .top-bar {
            width: 90%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }

        .level-text {
            color: #00ffcc;
        }

        .nickname-text {
            color: #fff;
            cursor: pointer;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            border-radius: 6px;
            transition: width 0.1s ease;
        }

        .progress-percent {
            font-size: 11px;
            color: #a0a0b8;
            text-align: right;
            margin-top: 2px;
        }

        /* BALANS */
        .score-container {
            text-align: center;
        }

        .score-title {
            font-size: 12px;
            color: #a0a0b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score {
            font-size: 50px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* ORTADAGI DUMALOQ VA MALIBU */
        .circle-outer {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #1a1a2e, #07070a);
            border-radius: 50%;
            border: 6px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 20px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            position: relative;
        }

        .circle-text {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: rgba(255, 215, 0, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            pointer-events: none;
        }

        .malibu-img {
            width: 85%;
            height: auto;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* DO'KON */
        .shop-container {
            width: 90%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 14px;
            border-radius: 12px;
        }

        .item-title { font-size: 14px; font-weight: bold; }
        .item-desc { font-size: 11px; color: #a0a0b8; }

        .buy-btn {
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            border: none;
            color: black;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        /* EFFEKT MATNI */
        .floating-text {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.4s ease-out forwards;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-110px) scale(1.2); }
        }

        /* MAXFIY ADMIN PANEL MODAL */
        #adminModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .admin-card {
            background: #1c1c28;
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 20px;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .admin-card h3 { color: #00ffcc; margin-bottom: 15px; font-size: 18px; }
        .admin-input {
            width: 100%; padding: 10px; margin-bottom: 12px;
            border-radius: 8px; border: 1px solid #444;
            background: #000; color: white; text-align: center;
        }
        .admin-btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: #00ffcc; color: black; font-weight: bold; margin-bottom: 8px;
            cursor: pointer;
        }
        .close-admin { color: #a0a0b8; font-size: 13px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- 1. RO'YXATDAN O'TISH EKRANI -->
    <div id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">🏎</div>
            <div class="auth-title">Malibu Clicker</div>
            <div style="color: #a0a0b8; font-size: 13px; margin-bottom: 20px;">O'yindagi nikingizni kiriting:</div>
            <input type="text" id="nikInput" class="auth-input" placeholder="Nikni yozing..." maxlength="15">
            <button class="auth-btn" onclick="registerUser()">KIRISH 🚀</button>
        </div>
    </div>

    <!-- 2. ASOSIY O'YIN EKRANI -->
    <div id="gameScreen">
        <!-- Yuqori qism: Level va Progress Bar -->
        <div class="top-bar">
            <div class="user-info-row">
                <span class="nickname-text" id="displayNik" onclick="tryOpenAdmin()">Nik: -</span>
                <span class="level-text" id="displayLevel">Daraja: 1</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-percent" id="progressPercent">0% (0 / 1000)</div>
        </div>

        <!-- Balans -->
        <div class="score-container">
            <div class="score-title">Balans</div>
            <div class="score" id="scoreDisplay">0</div>
        </div>

        <!-- O'rtadagi dumaloq va Malibu moshinasi -->
        <div class="circle-outer" id="clickArea">
            <img src="https://i.postimg.cc/D0Yg06g4/malibu.png" alt="Malibu 2" class="malibu-img">
            <div class="circle-text">SHU YERGA BOSING</div>
        </div>

        <!-- Upgrade do'koni -->
        <div class="shop-container">
            <div class="shop-item">
                <div>
                    <div class="item-title">🚀 Moshniy Motor</div>
                    <div class="item-desc">Har klikda +1 tanga ko'p beradi</div>
                </div>
                <button class="buy-btn" id="motorBtn">50 💰</button>
            </div>
        </div>
    </div>

    <!-- 3. MAXFIY ADMIN PANEL MODAL -->
    <div id="adminModal">
        <div class="admin-card">
            <h3>🛠 MAXFIY ADMIN PANEL</h3>
            <div id="adminAuthSection">
                <input type="password" id="adminPassword" class="admin-input" placeholder="Parolni kiriting...">
                <button class="admin-btn" onclick="checkAdminPassword()">KIRISH</button>
            </div>
            <div id="adminControlsSection" style="display: none;">
                <p style="font-size:12px; color:#a0a0b8; margin-bottom:10px;">Nik orqali tanga va daraja berish</p>
                <input type="text" id="targetNik" class="admin-input" placeholder="Foydalanuvchi niki...">
                <input type="number" id="addCoinsAmount" class="admin-input" placeholder="Qancha tanga qo'shish...">
                <input type="number" id="addLevelAmount" class="admin-input" placeholder="Qancha daraja qo'shish...">
                <button class="admin-btn" onclick="applyAdminChanges()">TIZIMGA QO'SHISH</button>
            </div>
            <div class="close-admin" onclick="closeAdminModal()">Yopish</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "guest_player";

        const keyPrefix = `mb_${userId}_`;
        let userNickname = localStorage.getItem(keyPrefix + 'nik') || "";
        let score = parseInt(localStorage.getItem(keyPrefix + 'score')) || 0;
        let clickPower = parseInt(localStorage.getItem(keyPrefix + 'power')) || 1;
        let motorCost = parseInt(localStorage.getItem(keyPrefix + 'cost')) || 50;
        let totalClicks = parseInt(localStorage.getItem(keyPrefix + 'clicks')) || 0;
        let level = parseInt(localStorage.getItem(keyPrefix + 'level')) || 1;

        const clicksPerLevel = 1000;

        const authScreen = document.getElementById('authScreen');
        const gameScreen = document.getElementById('gameScreen');
        const displayNik = document.getElementById('displayNik');
        const displayLevel = document.getElementById('displayLevel');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const clickArea = document.getElementById('clickArea');
        const motorBtn = document.getElementById('motorBtn');
        const adminModal = document.getElementById('adminModal');

        if (userNickname) {
            initGame();
        }

        function registerUser() {
            const input = document.getElementById('nikInput').value.trim();
            if (!input) {
                alert("Iltimos, nik yozing!");
                return;
            }
            userNickname = input;
            localStorage.setItem(keyPrefix + 'nik', userNickname);
            initGame();
        }

        function initGame() {
            authScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            displayNik.textContent = `Nik: ${userNickname}`;
            updateUI();
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            displayLevel.textContent = `Daraja: ${level}`;
            motorBtn.textContent = motorCost + " 💰";

            let currentLevelClicks = totalClicks % clicksPerLevel;
            let percent = Math.floor((currentLevelClicks / clicksPerLevel) * 100);
            
            progressBar.style.width = percent + "%";
            progressPercent.textContent = `${percent}% (${currentLevelClicks} / ${clicksPerLevel})`;
        }

        function handleTap(clientX, clientY) {
            score += clickPower;
            totalClicks += 1;

            let newLevel = Math.floor(totalClicks / clicksPerLevel) + 1;
            if (newLevel > level) {
                level = newLevel;
                if(tg) tg.HapticFeedback?.notificationOccurred('success');
            }

            saveData();
            updateUI();

            clickArea.style.transform = 'scale(0.95)';
            setTimeout(() => { clickArea.style.transform = 'scale(1)'; }, 50);

            const rect = clickArea.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            const floatText = document.createElement('div');
            floatText.className = 'floating-text';
            floatText.textContent = '+' + clickPower;
            floatText.style.left = `${x}px`;
            floatText.style.top = `${y}px`;

            clickArea.appendChild(floatText);
            setTimeout(() => { floatText.remove(); }, 400);
        }

        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e.touches[0].clientX, e.touches[0].clientY);
        });

        clickArea.addEventListener('mousedown', (e) => {
            if (e.type === 'mousedown' && 'ontouchstart' in window) return;
            handleTap(e.clientX, e.clientY);
        });

        // MOTOR SOTIB OLISH
        motorBtn.addEventListener('click', () => {
            if (score >= motorCost) {
                score -= motorCost;
                clickPower += 1;
                motorCost = Math.floor(motorCost * 1.8);
                saveData();
                updateUI();
            } else {
                if(tg) tg.showAlert("Tangalaringiz yetarli emas! 🏎💨");
                else alert("Tangalaringiz yetarli emas! 🏎💨");
            }
        });

        function saveData() {
            localStorage.setItem(keyPrefix + 'score', score);
            localStorage.setItem(keyPrefix + 'power', clickPower);
            localStorage.setItem(keyPrefix + 'cost', motorCost);
            localStorage.setItem(keyPrefix + 'clicks', totalClicks);
            localStorage.setItem(keyPrefix + 'level', level);
        }

        // --- ADMIN PANEL ---
        let clickCountOnNik = 0;
        function tryOpenAdmin() {
            clickCountOnNik++;
            if (clickCountOnNik >= 5) {
                clickCountOnNik = 0;
                adminModal.style.display = 'flex';
                document.getElementById('adminAuthSection').style.display = 'block';
                document.getElementById('adminControlsSection').style.display = 'none';
                document.getElementById('adminPassword').value = '';
            }
        }

        function checkAdminPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === '1506.2011') {
                document.getElementById('adminAuthSection').style.display = 'none';
                document.getElementById('adminControlsSection').style.display = 'block';
            } else {
                alert("Xato parol!");
                closeAdminModal();
            }
        }

        function applyAdminChanges() {
            const target = document.getElementById('targetNik').value.trim();
            const addCoins = parseInt(document.getElementById('addCoinsAmount').value) || 0;
            const addLvl = parseInt(document.getElementById('addLevelAmount').value) || 0;

            if (!target) {
                alert("Nikni kiriting!");
                return;
            }

            if (target.toLowerCase() === userNickname.toLowerCase()) {
                score += addCoins;
                level += addLvl;
                totalClicks += addLvl * clicksPerLevel; 
                saveData();
                updateUI();
                alert(`Muvaffaqiyatli! ${target} nikiga ${addCoins} tanga va ${addLvl} daraja qo'shildi!`);
            } else {
                alert("Foydalanuvchi topilmadi! (Faqat o'z nikingizda sinab ko'ring)");
            }
            closeAdminModal();
        }

        function closeAdminModal() {
            adminModal.style.display = 'none';
        }
    </script>
</body>
                    </html>
